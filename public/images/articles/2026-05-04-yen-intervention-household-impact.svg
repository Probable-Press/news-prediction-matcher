<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">円安介入とは？家計・企業への影響</title>
  <desc id="desc">円安、為替介入、円高方向への反応、家計と企業への影響を4段階で示す図解</desc>
  <defs>
    <style>
      .bg{fill:#f7f9fc}.navy{fill:#0b2e5f}.blue{fill:#1d63b7}.light{fill:#eef5ff}.card{fill:#fff;stroke:#c8d8ed;stroke-width:3}.txt{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif}.title{font-size:64px;font-weight:800;fill:#092653}.sub{font-size:30px;font-weight:700;fill:#173c70}.h{font-size:36px;font-weight:800;fill:#fff}.body{font-size:26px;font-weight:700;fill:#1b1b1b}.small{font-size:22px;fill:#333}.badge{fill:#1456a3}.line{fill:none;stroke:#1d63b7;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}.grid{stroke:#dce5f2;stroke-width:2}.muted{fill:#6b7687}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0b2e5f" flood-opacity="0.16"/></filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto"><path d="M0,0 L16,8 L0,16 Z" fill="#1d63b7"/></marker>
  </defs>
  <rect width="1600" height="900" class="bg"/>
  <text x="800" y="85" text-anchor="middle" class="txt title">円安介入とは？家計・企業への影響</text>
  <text x="800" y="135" text-anchor="middle" class="txt sub">円安 → 介入 → 円高方向 → 生活と企業コスト</text>

  <!-- arrows -->
  <line x1="375" y1="470" x2="450" y2="470" stroke="#1d63b7" stroke-width="22" marker-end="url(#arrow)"/>
  <line x1="745" y1="470" x2="820" y2="470" stroke="#1d63b7" stroke-width="22" marker-end="url(#arrow)"/>
  <line x1="1115" y1="470" x2="1190" y2="470" stroke="#1d63b7" stroke-width="22" marker-end="url(#arrow)"/>

  <!-- Card 1 -->
  <g transform="translate(50,190)" filter="url(#shadow)">
    <rect width="320" height="610" rx="20" class="card"/>
    <circle cx="50" cy="50" r="32" class="badge"/><text x="50" y="62" text-anchor="middle" class="txt h">1</text>
    <circle cx="145" cy="135" r="55" class="blue"/><text x="145" y="157" text-anchor="middle" class="txt" font-size="72" font-weight="800" fill="#fff">¥</text>
    <g transform="translate(45,210)">
      <line x1="0" y1="0" x2="250" y2="0" class="grid"/><line x1="0" y1="55" x2="250" y2="55" class="grid"/><line x1="0" y1="110" x2="250" y2="110" class="grid"/><line x1="0" y1="165" x2="250" y2="165" class="grid"/>
      <text x="-8" y="8" text-anchor="end" class="txt small">170</text><text x="-8" y="63" text-anchor="end" class="txt small">160</text><text x="-8" y="118" text-anchor="end" class="txt small">150</text><text x="-8" y="173" text-anchor="end" class="txt small">140</text>
      <path d="M0 145 L30 132 L60 120 L85 105 L110 95 L135 70 L160 90 L185 88 L210 70 L235 62 L250 50" class="line"/>
      <circle cx="250" cy="50" r="9" class="blue"/>
      <rect x="165" y="30" width="88" height="40" rx="8" class="navy"/><text x="209" y="58" text-anchor="middle" class="txt" font-size="24" font-weight="800" fill="#fff">160円台</text>
      <text x="0" y="205" class="txt small">1月</text><text x="85" y="205" class="txt small">4月</text><text x="165" y="205" class="txt small">7月</text><text x="225" y="205" class="txt small">10月</text>
    </g>
    <rect x="0" y="430" width="320" height="90" class="navy"/><text x="160" y="490" text-anchor="middle" class="txt h">円安</text>
    <text x="160" y="565" text-anchor="middle" class="txt body">1ドル=160円台</text>
  </g>

  <!-- Card 2 -->
  <g transform="translate(420,190)" filter="url(#shadow)">
    <rect width="320" height="610" rx="20" class="card"/>
    <circle cx="50" cy="50" r="32" class="badge"/><text x="50" y="62" text-anchor="middle" class="txt h">2</text>
    <g transform="translate(70,95)">
      <rect x="45" y="90" width="150" height="120" fill="#d8c7b0" stroke="#9b8b75" stroke-width="2"/>
      <rect x="70" y="120" width="22" height="90" fill="#f1e7d7"/><rect x="108" y="120" width="22" height="90" fill="#f1e7d7"/><rect x="146" y="120" width="22" height="90" fill="#f1e7d7"/>
      <polygon points="35,90 120,30 205,90" fill="#c7b090" stroke="#9b8b75" stroke-width="2"/>
      <rect x="20" y="210" width="200" height="30" fill="#c7b090"/>
      <path d="M70 310 A90 90 0 0 1 190 310" fill="none" stroke="#1d63b7" stroke-width="22" marker-end="url(#arrow)"/>
      <path d="M190 350 A90 90 0 0 1 70 350" fill="none" stroke="#74a7df" stroke-width="22" marker-end="url(#arrow)"/>
      <circle cx="70" cy="340" r="50" class="navy"/><text x="70" y="350" text-anchor="middle" class="txt" font-size="24" font-weight="800" fill="#fff">財務省</text>
      <circle cx="190" cy="340" r="50" fill="#5f96d4"/><text x="190" y="350" text-anchor="middle" class="txt" font-size="24" font-weight="800" fill="#fff">日本銀行</text>
    </g>
    <rect x="0" y="430" width="320" height="90" class="navy"/><text x="160" y="490" text-anchor="middle" class="txt h">為替介入</text>
    <text x="160" y="565" text-anchor="middle" class="txt body">政府・日銀が円買い</text>
  </g>

  <!-- Card 3 -->
  <g transform="translate(790,190)" filter="url(#shadow)">
    <rect width="320" height="610" rx="20" class="card"/>
    <circle cx="50" cy="50" r="32" class="badge"/><text x="50" y="62" text-anchor="middle" class="txt h">3</text>
    <circle cx="110" cy="135" r="55" class="blue"/><text x="110" y="157" text-anchor="middle" class="txt" font-size="72" font-weight="800" fill="#fff">¥</text>
    <g transform="translate(45,210)">
      <line x1="0" y1="0" x2="250" y2="0" class="grid"/><line x1="0" y1="55" x2="250" y2="55" class="grid"/><line x1="0" y1="110" x2="250" y2="110" class="grid"/><line x1="0" y1="165" x2="250" y2="165" class="grid"/>
      <text x="-8" y="8" text-anchor="end" class="txt small">170</text><text x="-8" y="63" text-anchor="end" class="txt small">160</text><text x="-8" y="118" text-anchor="end" class="txt small">150</text><text x="-8" y="173" text-anchor="end" class="txt small">140</text>
      <path d="M0 90 L35 70 L70 42 L105 35 L140 78 L170 96 L205 118 L235 107 L250 100" class="line"/>
      <circle cx="250" cy="100" r="9" class="blue"/>
      <rect x="165" y="72" width="88" height="40" rx="8" class="navy"/><text x="209" y="100" text-anchor="middle" class="txt" font-size="24" font-weight="800" fill="#fff">156円台</text>
      <text x="0" y="205" class="txt small">1月</text><text x="85" y="205" class="txt small">4月</text><text x="165" y="205" class="txt small">7月</text><text x="225" y="205" class="txt small">10月</text>
    </g>
    <rect x="0" y="430" width="320" height="90" class="navy"/><text x="160" y="490" text-anchor="middle" class="txt h">円高方向へ</text>
    <text x="160" y="565" text-anchor="middle" class="txt body">1ドル=156円台</text>
  </g>

  <!-- Card 4 -->
  <g transform="translate(1160,190)" filter="url(#shadow)">
    <rect width="320" height="610" rx="20" class="card"/>
    <circle cx="50" cy="50" r="32" class="badge"/><text x="50" y="62" text-anchor="middle" class="txt h">4</text>
    <g transform="translate(65,140)">
      <rect x="0" y="140" width="120" height="90" rx="8" class="blue"/><rect x="20" y="120" width="80" height="30" fill="#d8e9ff" stroke="#1d63b7" stroke-width="4"/>
      <rect x="20" y="160" width="22" height="50" fill="#74a7df"/><rect x="55" y="160" width="22" height="50" fill="#74a7df"/><rect x="90" y="160" width="22" height="50" fill="#74a7df"/>
      <rect x="20" y="75" width="35" height="60" fill="#e6f1ff" stroke="#1d63b7"/><rect x="65" y="70" width="45" height="65" fill="#d3efd7" stroke="#6aa66f"/><rect x="112" y="85" width="45" height="50" fill="#ffd98a" stroke="#bf8a22"/>
      <rect x="150" y="90" width="135" height="140" fill="#d6d8dc"/><polygon points="150,90 195,55 195,90 240,55 240,90 285,55 285,230 150,230" fill="#d6d8dc"/>
      <rect x="170" y="130" width="20" height="22" fill="#5f96d4"/><rect x="210" y="130" width="20" height="22" fill="#5f96d4"/><rect x="250" y="130" width="20" height="22" fill="#5f96d4"/>
      <rect x="235" y="40" width="22" height="95" fill="#888"/><circle cx="260" cy="28" r="18" fill="#cfd2d8"/><circle cx="283" cy="26" r="20" fill="#cfd2d8"/><circle cx="306" cy="35" r="16" fill="#cfd2d8"/>
    </g>
    <rect x="0" y="430" width="320" height="90" class="navy"/><text x="160" y="485" text-anchor="middle" class="txt" font-size="30" font-weight="800" fill="#fff">家計・企業への影響</text>
    <text x="160" y="565" text-anchor="middle" class="txt body">輸入価格・コストに影響</text>
  </g>
</svg>
