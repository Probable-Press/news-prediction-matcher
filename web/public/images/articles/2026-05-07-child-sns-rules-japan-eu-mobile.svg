<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1300" viewBox="0 0 900 1300" role="img" aria-label="子どものSNS利用ルールが家庭、学校、企業、政府に広がる流れを示す縦型図解">
  <rect width="900" height="1300" fill="#f6f8fb"/>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif}.title{font-size:45px;font-weight:800;fill:#10243e}.sub{font-size:24px;font-weight:700;fill:#496070}.card{fill:#fff;stroke:#cdd8e5;stroke-width:3}.head{font-size:31px;font-weight:800;fill:#10243e}.body{font-size:23px;font-weight:700;fill:#3a4650}.pill{fill:#166b73}.blue{fill:#2f6fb2}.green{fill:#2f8b68}.accent{fill:#f3b23f}.arrow{fill:#166b73}
  </style>
  <text x="450" y="72" text-anchor="middle" class="title">子どものSNSルール</text>
  <text x="450" y="114" text-anchor="middle" class="sub">日本とEUの連携から対策へ</text>

  <g transform="translate(90,170)">
    <rect width="720" height="190" rx="18" class="card"/>
    <circle cx="82" cy="95" r="52" class="blue"/>
    <rect x="48" y="58" width="68" height="96" rx="16" fill="#fff"/>
    <rect x="60" y="72" width="44" height="54" rx="8" fill="#dbe9f7"/>
    <circle cx="82" cy="140" r="6" fill="#2f6fb2"/>
    <text x="178" y="70" class="head">家庭</text>
    <text x="178" y="112" class="body">時間だけでなく使い方を見る</text>
    <rect x="178" y="134" width="190" height="42" rx="21" class="pill"/>
    <text x="273" y="162" text-anchor="middle" font-size="21" font-weight="800" fill="#fff">対話と相談</text>
  </g>

  <polygon points="450,400 475,360 425,360" class="arrow"/>

  <g transform="translate(90,430)">
    <rect width="720" height="190" rx="18" class="card"/>
    <circle cx="82" cy="95" r="52" class="green"/>
    <path d="M34 98 L82 66 L130 98 L82 128 Z" fill="#fff"/>
    <path d="M52 124 L52 154 L112 154 L112 124" fill="#dcefe6" stroke="#fff" stroke-width="5"/>
    <text x="178" y="70" class="head">学校</text>
    <text x="178" y="112" class="body">うその情報や被害を学ぶ</text>
    <rect x="178" y="134" width="210" height="42" rx="21" class="pill"/>
    <text x="283" y="162" text-anchor="middle" font-size="21" font-weight="800" fill="#fff">デジタル教育</text>
  </g>

  <polygon points="450,660 475,620 425,620" class="arrow"/>

  <g transform="translate(90,690)">
    <rect width="720" height="190" rx="18" class="card"/>
    <circle cx="82" cy="95" r="52" class="accent"/>
    <rect x="36" y="64" width="92" height="66" rx="12" fill="#fff"/>
    <circle cx="60" cy="98" r="10" fill="#f3b23f"/>
    <circle cx="82" cy="98" r="10" fill="#f3b23f"/>
    <circle cx="104" cy="98" r="10" fill="#f3b23f"/>
    <text x="178" y="70" class="head">企業</text>
    <text x="178" y="112" class="body">おすすめ表示と通報を改善</text>
    <rect x="178" y="134" width="190" height="42" rx="21" class="pill"/>
    <text x="273" y="162" text-anchor="middle" font-size="21" font-weight="800" fill="#fff">設計責任</text>
  </g>

  <polygon points="450,920 475,880 425,880" class="arrow"/>

  <g transform="translate(90,950)">
    <rect width="720" height="190" rx="18" class="card"/>
    <circle cx="82" cy="95" r="52" fill="#9b5ca8"/>
    <path d="M48 62 H116 V128 H48 Z" fill="#fff"/>
    <path d="M61 82 H103 M61 101 H103 M61 120 H92" stroke="#9b5ca8" stroke-width="7" stroke-linecap="round"/>
    <text x="178" y="70" class="head">政府</text>
    <text x="178" y="112" class="body">国際連携でルールを整える</text>
    <rect x="178" y="134" width="190" height="42" rx="21" class="pill"/>
    <text x="273" y="162" text-anchor="middle" font-size="21" font-weight="800" fill="#fff">日本とEU</text>
  </g>

  <rect x="90" y="1185" width="720" height="72" rx="20" fill="#10243e"/>
  <text x="450" y="1230" text-anchor="middle" font-size="23" font-weight="800" fill="#fff">安全とプライバシーをセットで見る</text>
</svg>
