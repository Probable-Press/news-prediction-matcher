<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ハンタウイルスニュースの読み方</title>
  <desc id="desc">ハンタウイルスの主な感染経路、アンデスウイルスの限定的な人から人への感染、生活者が見るべき点を示す図解</desc>
  <rect width="1600" height="900" fill="#fafaf9"/>
  <rect x="64" y="64" width="1472" height="772" rx="28" fill="#ffffff" stroke="#e7e5e4" stroke-width="3"/>
  <text x="112" y="146" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="54" font-weight="700" fill="#1c1917">ハンタウイルスのニュースをどう読む？</text>
  <text x="116" y="204" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="28" fill="#57534e">怖がりすぎず、軽く見すぎず。感染経路と自分との距離を分けて確認する。</text>

  <g transform="translate(120 285)">
    <rect width="360" height="270" rx="22" fill="#eef6ff" stroke="#7aa7d9" stroke-width="3"/>
    <circle cx="118" cy="110" r="46" fill="#1f6fb2"/>
    <ellipse cx="158" cy="118" rx="72" ry="46" fill="#cfe8ff" stroke="#1f6fb2" stroke-width="7"/>
    <circle cx="186" cy="100" r="7" fill="#1c1917"/>
    <path d="M223 123c42 4 68 19 78 44" fill="none" stroke="#1f6fb2" stroke-width="9" stroke-linecap="round"/>
    <text x="180" y="205" text-anchor="middle" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="30" font-weight="700" fill="#1c1917">主な入口</text>
    <text x="180" y="244" text-anchor="middle" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="22" fill="#57534e">げっ歯類の尿・ふん・唾液</text>
  </g>

  <path d="M518 420h122" stroke="#a8a29e" stroke-width="8" stroke-linecap="round"/>
  <path d="M640 420l-28-20v40z" fill="#a8a29e"/>

  <g transform="translate(670 285)">
    <rect width="360" height="270" rx="22" fill="#f0fdf4" stroke="#75b889" stroke-width="3"/>
    <circle cx="130" cy="112" r="52" fill="#dcfce7" stroke="#15803d" stroke-width="7"/>
    <circle cx="230" cy="112" r="52" fill="#dcfce7" stroke="#15803d" stroke-width="7"/>
    <path d="M165 112h30" stroke="#15803d" stroke-width="8" stroke-linecap="round"/>
    <path d="M182 94l30 18-30 18" fill="none" stroke="#15803d" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="180" y="205" text-anchor="middle" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="30" font-weight="700" fill="#1c1917">例外に注意</text>
    <text x="180" y="244" text-anchor="middle" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="22" fill="#57534e">アンデス型は濃厚接触で限定的</text>
  </g>

  <path d="M1068 420h122" stroke="#a8a29e" stroke-width="8" stroke-linecap="round"/>
  <path d="M1190 420l-28-20v40z" fill="#a8a29e"/>

  <g transform="translate(1220 285)">
    <rect width="220" height="270" rx="22" fill="#fff7ed" stroke="#e6a15a" stroke-width="3"/>
    <circle cx="110" cy="104" r="52" fill="#fef3c7" stroke="#b45309" stroke-width="7"/>
    <path d="M88 104l16 18 36-44" fill="none" stroke="#b45309" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="110" y="205" text-anchor="middle" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="28" font-weight="700" fill="#1c1917">見る点</text>
    <text x="110" y="244" text-anchor="middle" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="20" fill="#57534e">接触歴と公的発表</text>
  </g>

  <g transform="translate(210 640)">
    <rect width="1180" height="118" rx="22" fill="#fef2f2" stroke="#fecaca" stroke-width="3"/>
    <text x="52" y="50" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="30" font-weight="700" fill="#991b1b">読み方のコツ</text>
    <text x="52" y="90" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="24" fill="#1c1917">病気の重さ / 広がりやすさ / 自分の生活との関係を分けて考える</text>
  </g>
</svg>
