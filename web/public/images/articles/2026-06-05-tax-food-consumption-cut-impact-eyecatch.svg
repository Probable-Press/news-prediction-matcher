<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">食料品の消費税減税アイキャッチ</title>
  <desc id="desc">食料品の消費税減税が家計、外食、生産者に及ぼす影響を示すアイキャッチ</desc>
  <rect width="1200" height="630" fill="#fafaf9"/>
  <rect x="44" y="44" width="1112" height="542" rx="28" fill="#ffffff" stroke="#e7e5e4" stroke-width="3"/>
  <rect x="84" y="86" width="244" height="78" rx="16" fill="#ecfdf5"/>
  <text x="206" y="136" text-anchor="middle" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="32" font-weight="700" fill="#166534">税制と家計</text>
  <text x="84" y="246" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="56" font-weight="700" fill="#1c1917">食料品の</text>
  <text x="84" y="318" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="56" font-weight="700" fill="#1c1917">消費税減税とは？</text>
  <text x="88" y="384" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="28" fill="#57534e">家計・外食・農家に何が起きるのか</text>
  <text x="88" y="436" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="24" fill="#57534e">レシートの先にある制度変更を整理</text>

  <g transform="translate(780 132)">
    <rect x="0" y="0" width="270" height="360" rx="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="5"/>
    <rect x="42" y="54" width="186" height="28" rx="8" fill="#cbd5e1"/>
    <rect x="42" y="118" width="186" height="22" rx="7" fill="#bbf7d0"/>
    <rect x="42" y="166" width="150" height="22" rx="7" fill="#bfdbfe"/>
    <rect x="42" y="214" width="170" height="22" rx="7" fill="#fed7aa"/>
    <line x1="42" y1="276" x2="228" y2="276" stroke="#94a3b8" stroke-width="5"/>
    <text x="58" y="326" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="42" font-weight="700" fill="#166534">8%?</text>
    <text x="162" y="326" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="42" font-weight="700" fill="#b45309">0%?</text>
    <circle cx="232" cy="72" r="54" fill="#fef3c7" stroke="#f59e0b" stroke-width="7"/>
    <text x="232" y="91" text-anchor="middle" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="56" font-weight="700" fill="#92400e">¥</text>
  </g>
</svg>
