<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1300" viewBox="0 0 900 1300" role="img" aria-label="再審制度の流れと検察抗告の焦点を示す縦型図解">
  <rect width="900" height="1300" fill="#f7f8fb"/>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif}.title{font-size:43px;font-weight:900;fill:#172033}.sub{font-size:23px;font-weight:700;fill:#566070}.card{fill:#fff;stroke:#cfd7e3;stroke-width:3}.head{font-size:30px;font-weight:900;fill:#172033}.body{font-size:23px;font-weight:700;fill:#3f4752}.blue{fill:#2b6fb3}.teal{fill:#16746d}.gold{fill:#d79a2b}.red{fill:#c94b48}.pill{fill:#172033}.arrow{fill:#16746d}
  </style>
  <text x="450" y="72" text-anchor="middle" class="title">再審制度見直し</text>
  <text x="450" y="112" text-anchor="middle" class="sub">裁判のやり直しへ進む道</text>

  <g transform="translate(90,170)">
    <rect width="720" height="178" rx="18" class="card"/>
    <circle cx="82" cy="89" r="48" class="blue"/>
    <path d="M54 112 H110 M62 88 H102 M70 67 H94" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
    <text x="170" y="70" class="head">判決確定</text>
    <text x="170" y="112" class="body">いったん裁判が終わる</text>
    <rect x="170" y="130" width="150" height="38" rx="19" class="pill"/>
    <text x="245" y="156" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">入口</text>
  </g>
  <polygon points="450,388 475,348 425,348" class="arrow"/>

  <g transform="translate(90,420)">
    <rect width="720" height="178" rx="18" class="card"/>
    <circle cx="82" cy="89" r="48" class="gold"/>
    <path d="M46 94 L72 120 L122 70" fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="170" y="70" class="head">新証拠</text>
    <text x="170" y="112" class="body">あとから重要な材料が出る</text>
    <rect x="170" y="130" width="170" height="38" rx="19" class="pill"/>
    <text x="255" y="156" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">見直し</text>
  </g>
  <polygon points="450,638 475,598 425,598" class="arrow"/>

  <g transform="translate(90,670)">
    <rect width="720" height="178" rx="18" class="card"/>
    <circle cx="82" cy="89" r="48" class="teal"/>
    <path d="M48 90 H116 M58 116 H106 M68 66 H96" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
    <text x="170" y="70" class="head">再審開始</text>
    <text x="170" y="112" class="body">裁判所がやり直しを認める</text>
    <rect x="170" y="130" width="190" height="38" rx="19" class="pill"/>
    <text x="265" y="156" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">大きな決定</text>
  </g>
  <polygon points="450,888 475,848 425,848" class="arrow"/>

  <g transform="translate(90,920)">
    <rect width="720" height="178" rx="18" class="card"/>
    <circle cx="82" cy="89" r="48" class="red"/>
    <path d="M58 66 L106 114 M106 66 L58 114" stroke="#fff" stroke-width="12" stroke-linecap="round"/>
    <text x="170" y="70" class="head">検察抗告</text>
    <text x="170" y="112" class="body">不服申し立てをどこまで認めるか</text>
    <rect x="170" y="130" width="210" height="38" rx="19" fill="#c94b48"/>
    <text x="275" y="156" text-anchor="middle" font-size="20" font-weight="800" fill="#fff">今回の焦点</text>
  </g>

  <rect x="90" y="1168" width="720" height="78" rx="20" fill="#172033"/>
  <text x="450" y="1200" text-anchor="middle" font-size="22" font-weight="900" fill="#fff">原則禁止は「基本は抗告しない」</text>
  <text x="450" y="1232" text-anchor="middle" font-size="20" font-weight="700" fill="#dfe7f0">例外条件の書き方が焦点</text>
</svg>
