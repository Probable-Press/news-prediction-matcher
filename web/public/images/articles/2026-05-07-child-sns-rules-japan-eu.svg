<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="子どものSNS利用ルールが家庭、学校、企業、政府に広がる流れを示す横型図解">
  <rect width="1600" height="900" fill="#f6f8fb"/>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif}.title{font-size:56px;font-weight:800;fill:#10243e}.sub{font-size:27px;font-weight:700;fill:#496070}.card{fill:#fff;stroke:#cdd8e5;stroke-width:3}.head{font-size:32px;font-weight:800;fill:#10243e}.body{font-size:23px;font-weight:700;fill:#3a4650}.small{font-size:20px;font-weight:700;fill:#5d6b76}.pill{fill:#166b73}.accent{fill:#f3b23f}.blue{fill:#2f6fb2}.green{fill:#2f8b68}.line{fill:none;stroke:#166b73;stroke-width:7;stroke-linecap:round}.arrow{fill:#166b73}
  </style>
  <text x="800" y="78" text-anchor="middle" class="title">子どものSNSルールはどう変わる？</text>
  <text x="800" y="128" text-anchor="middle" class="sub">日本とEUの情報共有から、家庭・学校・企業の対策へ</text>

  <g transform="translate(95,210)">
    <rect width="300" height="455" rx="18" class="card"/>
    <circle cx="150" cy="92" r="58" class="blue"/>
    <rect x="112" y="52" width="76" height="118" rx="18" fill="#fff"/>
    <rect x="124" y="68" width="52" height="68" rx="8" fill="#dbe9f7"/>
    <circle cx="150" cy="151" r="7" fill="#2f6fb2"/>
    <text x="150" y="222" text-anchor="middle" class="head">家庭</text>
    <text x="150" y="276" text-anchor="middle" class="body">時間だけでなく</text>
    <text x="150" y="313" text-anchor="middle" class="body">使い方を見る</text>
    <rect x="48" y="350" width="204" height="54" rx="27" class="pill"/>
    <text x="150" y="385" text-anchor="middle" font-size="23" font-weight="800" fill="#fff">対話と相談</text>
  </g>

  <g transform="translate(475,210)">
    <rect width="300" height="455" rx="18" class="card"/>
    <circle cx="150" cy="92" r="58" class="green"/>
    <path d="M92 96 L150 62 L208 96 L150 130 Z" fill="#fff"/>
    <path d="M112 124 L112 162 L188 162 L188 124" fill="#dcefe6" stroke="#fff" stroke-width="5"/>
    <text x="150" y="222" text-anchor="middle" class="head">学校</text>
    <text x="150" y="276" text-anchor="middle" class="body">うその情報や</text>
    <text x="150" y="313" text-anchor="middle" class="body">被害を学ぶ</text>
    <rect x="48" y="350" width="204" height="54" rx="27" class="pill"/>
    <text x="150" y="385" text-anchor="middle" font-size="23" font-weight="800" fill="#fff">デジタル教育</text>
  </g>

  <g transform="translate(855,210)">
    <rect width="300" height="455" rx="18" class="card"/>
    <circle cx="150" cy="92" r="58" class="accent"/>
    <rect x="98" y="74" width="104" height="78" rx="12" fill="#fff"/>
    <circle cx="124" cy="113" r="12" fill="#f3b23f"/>
    <circle cx="150" cy="113" r="12" fill="#f3b23f"/>
    <circle cx="176" cy="113" r="12" fill="#f3b23f"/>
    <text x="150" y="222" text-anchor="middle" class="head">企業</text>
    <text x="150" y="276" text-anchor="middle" class="body">おすすめ表示と</text>
    <text x="150" y="313" text-anchor="middle" class="body">通報を改善</text>
    <rect x="48" y="350" width="204" height="54" rx="27" class="pill"/>
    <text x="150" y="385" text-anchor="middle" font-size="23" font-weight="800" fill="#fff">設計責任</text>
  </g>

  <g transform="translate(1235,210)">
    <rect width="300" height="455" rx="18" class="card"/>
    <circle cx="150" cy="92" r="58" fill="#9b5ca8"/>
    <path d="M112 70 H188 V144 H112 Z" fill="#fff"/>
    <path d="M126 92 H174 M126 112 H174 M126 132 H160" stroke="#9b5ca8" stroke-width="8" stroke-linecap="round"/>
    <text x="150" y="222" text-anchor="middle" class="head">政府</text>
    <text x="150" y="276" text-anchor="middle" class="body">国際連携で</text>
    <text x="150" y="313" text-anchor="middle" class="body">ルールを整える</text>
    <rect x="48" y="350" width="204" height="54" rx="27" class="pill"/>
    <text x="150" y="385" text-anchor="middle" font-size="23" font-weight="800" fill="#fff">日本とEU</text>
  </g>

  <path d="M414 438 H454" class="line"/><polygon points="454,438 430,423 430,453" class="arrow"/>
  <path d="M794 438 H834" class="line"/><polygon points="834,438 810,423 810,453" class="arrow"/>
  <path d="M1174 438 H1214" class="line"/><polygon points="1214,438 1190,423 1190,453" class="arrow"/>

  <g transform="translate(235,720)">
    <rect width="1130" height="94" rx="22" fill="#10243e"/>
    <text x="565" y="39" text-anchor="middle" font-size="27" font-weight="800" fill="#fff">ポイント</text>
    <text x="565" y="72" text-anchor="middle" class="small" fill="#dce7f2">禁止だけでなく、年齢確認・プライバシー・相談しやすさをセットで見る</text>
  </g>
</svg>
