<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="再審制度見直しの記事アイキャッチ">
  <rect width="1200" height="630" fill="#f7f8fb"/>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif}.kicker{font-size:30px;font-weight:900;fill:#16746d}.title{font-size:60px;font-weight:900;fill:#172033}.sub{font-size:28px;font-weight:700;fill:#566070}.label{font-size:24px;font-weight:900;fill:#fff}.small{font-size:22px;font-weight:700;fill:#3f4752}.card{fill:#fff;stroke:#cfd7e3;stroke-width:3}.teal{fill:#16746d}.blue{fill:#2b6fb3}.gold{fill:#d79a2b}.red{fill:#c94b48}
  </style>
  <text x="78" y="84" class="kicker">Probable Press</text>
  <text x="78" y="168" class="title">再審制度見直しとは？</text>
  <text x="78" y="242" class="title">検察抗告の焦点</text>
  <text x="80" y="304" class="sub">裁判のやり直しはどう変わるのか</text>

  <g transform="translate(80,405)">
    <rect width="182" height="60" rx="30" class="blue"/>
    <text x="91" y="39" text-anchor="middle" class="label">判決確定</text>
    <rect x="204" width="182" height="60" rx="30" class="gold"/>
    <text x="295" y="39" text-anchor="middle" class="label">新証拠</text>
    <rect x="408" width="182" height="60" rx="30" class="teal"/>
    <text x="499" y="39" text-anchor="middle" class="label">再審開始</text>
    <rect x="612" width="182" height="60" rx="30" class="red"/>
    <text x="703" y="39" text-anchor="middle" class="label">検察抗告</text>
  </g>

  <g transform="translate(790,92)">
    <rect x="0" y="40" width="300" height="390" rx="26" class="card"/>
    <rect x="56" y="0" width="188" height="78" rx="16" fill="#172033"/>
    <text x="150" y="51" text-anchor="middle" font-size="28" font-weight="900" fill="#fff">COURT</text>
    <rect x="55" y="125" width="190" height="22" rx="11" fill="#dce4ee"/>
    <rect x="55" y="176" width="190" height="22" rx="11" fill="#dce4ee"/>
    <rect x="55" y="227" width="140" height="22" rx="11" fill="#dce4ee"/>
    <circle cx="150" cy="335" r="60" class="teal"/>
    <path d="M117 335 L143 361 L188 307" fill="none" stroke="#fff" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="80" y="548" class="small">えん罪を防ぐための社会の安全装置を、どう動きやすくするか</text>
</svg>
