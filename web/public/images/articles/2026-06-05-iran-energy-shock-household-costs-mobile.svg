<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1300" viewBox="0 0 900 1300" role="img" aria-labelledby="title desc">
  <title id="title">スマホ向け中東情勢と家計コストの図解</title>
  <desc id="desc">中東情勢の混乱がエネルギー、物流、食品、家計に波及する流れを縦長で示す図解</desc>
  <rect width="900" height="1300" fill="#fafaf9"/>
  <rect x="44" y="44" width="812" height="1212" rx="28" fill="#ffffff" stroke="#e7e5e4" stroke-width="3"/>
  <text x="86" y="132" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="42" font-weight="700" fill="#1c1917">中東情勢は</text>
  <text x="86" y="188" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="42" font-weight="700" fill="#1c1917">どう家計に届く？</text>
  <text x="88" y="238" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="24" fill="#57534e">エネルギーから生活費へ広がる流れ</text>

  <g transform="translate(110 312)">
    <rect width="680" height="178" rx="22" fill="#fff7ed" stroke="#e6a15a" stroke-width="3"/>
    <path d="M162 46c30 38 46 64 46 92a46 46 0 1 1-92 0c0-28 16-54 46-92z" fill="#f97316" stroke="#b45309" stroke-width="7"/>
    <text x="344" y="82" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="31" font-weight="700" fill="#1c1917">エネルギー価格</text>
    <text x="344" y="126" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="23" fill="#57534e">原油・ガス・燃料が上がる</text>
  </g>

  <path d="M450 518v62" stroke="#a8a29e" stroke-width="8" stroke-linecap="round"/>
  <path d="M450 580l-22-30h44z" fill="#a8a29e"/>

  <g transform="translate(110 610)">
    <rect width="680" height="178" rx="22" fill="#eef6ff" stroke="#7aa7d9" stroke-width="3"/>
    <rect x="92" y="58" width="132" height="72" rx="12" fill="#ffffff" stroke="#1f6fb2" stroke-width="7"/>
    <circle cx="120" cy="142" r="18" fill="#1f6fb2"/>
    <circle cx="198" cy="142" r="18" fill="#1f6fb2"/>
    <path d="M224 86h30l22 38v8h-52z" fill="#cfe8ff" stroke="#1f6fb2" stroke-width="7" stroke-linejoin="round"/>
    <text x="344" y="82" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="31" font-weight="700" fill="#1c1917">物流・包装</text>
    <text x="344" y="126" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="23" fill="#57534e">送料や資材費に波及</text>
  </g>

  <path d="M450 816v62" stroke="#a8a29e" stroke-width="8" stroke-linecap="round"/>
  <path d="M450 878l-22-30h44z" fill="#a8a29e"/>

  <g transform="translate(110 908)">
    <rect width="680" height="178" rx="22" fill="#f0fdf4" stroke="#75b889" stroke-width="3"/>
    <circle cx="146" cy="88" r="38" fill="#dcfce7" stroke="#15803d" stroke-width="7"/>
    <path d="M146 50v76M108 88h76" stroke="#15803d" stroke-width="9" stroke-linecap="round"/>
    <text x="344" y="82" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="31" font-weight="700" fill="#1c1917">食品・日用品</text>
    <text x="344" y="126" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="23" fill="#57534e">時間差で店頭価格へ</text>
  </g>

  <text x="450" y="1188" text-anchor="middle" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="24" font-weight="700" fill="#991b1b">短期収束か、長期化かを分けて見る</text>
</svg>
