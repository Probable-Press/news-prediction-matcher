<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">円安介入とは？家計・企業への影響</title>
  <desc id="desc">円安、為替介入、円高方向への反応、家計と企業への影響を4段階で示す図解</desc>
  <defs>
    <style>
      .bg{fill:#f7f9fc}.navy{fill:#0b2e5f}.blue{fill:#1d63b7}.card{fill:#fff;stroke:#c8d8ed;stroke-width:3}.txt{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif}.title{font-size:64px;font-weight:800;fill:#092653}.sub{font-size:30px;font-weight:700;fill:#173c70}.h{font-size:34px;font-weight:800;fill:#fff}.body{font-size:26px;font-weight:700;fill:#1b1b1b}.small{font-size:22px;fill:#333}.badge{fill:#1456a3}.line{fill:none;stroke:#1d63b7;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}.grid{stroke:#dce5f2;stroke-width:2}.arrow{fill:#1d63b7}
    </style>
  </defs>
  <rect width="1600" height="900" class="bg"/>
  <text x="800" y="82" text-anchor="middle" class="txt title">円安介入とは？家計・企業への影響</text>
  <text x="800" y="132" text-anchor="middle" class="txt sub">円安 → 介入 → 円高方向 → 生活と企業コスト</text>

  <!-- smaller arrows -->
  <polygon points="390,450 420,470 390,490" class="arrow"/>
  <polygon points="760,450 790,470 760,490" class="arrow"/>
  <polygon points="1130,450 1160,470 1130,490" class="arrow"/>

  <!-- simplified cards remain same -->
  <g transform="translate(50,190)"><rect width="320" height="610" rx="20" class="card"/></g>
  <g transform="translate(420,190)"><rect width="320" height="610" rx="20" class="card"/></g>
  <g transform="translate(790,190)"><rect width="320" height="610" rx="20" class="card"/></g>
  <g transform="translate(1160,190)"><rect width="320" height="610" rx="20" class="card"/></g>
</svg>
