<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="円安介入と家計・企業への影響を示す横型図解">
  <rect width="1600" height="900" fill="#f7f9fc"/>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif}.title{font-size:58px;font-weight:800;fill:#0b2e5f}.sub{font-size:28px;font-weight:700;fill:#23466f}.card{fill:#fff;stroke:#c8d8ed;stroke-width:3}.blue{fill:#1d63b7}.navy{fill:#0b2e5f}.label{font-size:34px;font-weight:800;fill:#fff}.body{font-size:25px;font-weight:700;fill:#222}.small{font-size:21px;fill:#333}.line{fill:none;stroke:#1d63b7;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}.grid{stroke:#dce5f2;stroke-width:2}.arrow{fill:#1d63b7}
  </style>
  <text x="800" y="82" text-anchor="middle" class="title">円安介入とは？家計・企業への影響</text>
  <text x="800" y="132" text-anchor="middle" class="sub">円安 → 介入 → 円高方向 → 生活と企業コスト</text>
  <polygon points="392,452 422,470 392,488" class="arrow"/><polygon points="762,452 792,470 762,488" class="arrow"/><polygon points="1132,452 1162,470 1132,488" class="arrow"/>

  <g transform="translate(50,190)"><rect width="320" height="610" rx="20" class="card"/><circle cx="50" cy="50" r="32" class="blue"/><text x="50" y="62" text-anchor="middle" font-size="34" font-weight="800" fill="#fff">1</text><circle cx="142" cy="132" r="54" class="blue"/><text x="142" y="154" text-anchor="middle" font-size="70" font-weight="800" fill="#fff">¥</text><g transform="translate(45,220)"><line x1="0" y1="0" x2="250" y2="0" class="grid"/><line x1="0" y1="55" x2="250" y2="55" class="grid"/><line x1="0" y1="110" x2="250" y2="110" class="grid"/><line x1="0" y1="165" x2="250" y2="165" class="grid"/><text x="-8" y="8" text-anchor="end" class="small">170</text><text x="-8" y="63" text-anchor="end" class="small">160</text><text x="-8" y="118" text-anchor="end" class="small">150</text><text x="-8" y="173" text-anchor="end" class="small">140</text><path d="M0 145 L35 130 L70 116 L105 92 L135 70 L165 92 L195 86 L225 66 L250 50" class="line"/><circle cx="250" cy="50" r="9" class="blue"/><rect x="166" y="30" width="86" height="40" rx="8" class="navy"/><text x="209" y="58" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">160円台</text><text x="0" y="205" class="small">1月</text><text x="85" y="205" class="small">4月</text><text x="165" y="205" class="small">7月</text><text x="225" y="205" class="small">10月</text></g><rect y="430" width="320" height="90" class="navy"/><text x="160" y="488" text-anchor="middle" class="label">円安</text><text x="160" y="565" text-anchor="middle" class="body">1ドル=160円台</text></g>

  <g transform="translate(420,190)"><rect width="320" height="610" rx="20" class="card"/><circle cx="50" cy="50" r="32" class="blue"/><text x="50" y="62" text-anchor="middle" font-size="34" font-weight="800" fill="#fff">2</text><g transform="translate(82,110)"><rect x="45" y="80" width="140" height="105" fill="#d8c7b0" stroke="#9b8b75" stroke-width="2"/><polygon points="35,80 115,25 195,80" fill="#c7b090" stroke="#9b8b75" stroke-width="2"/><rect x="68" y="108" width="20" height="77" fill="#f1e7d7"/><rect x="105" y="108" width="20" height="77" fill="#f1e7d7"/><rect x="142" y="108" width="20" height="77" fill="#f1e7d7"/><path d="M62 300 A70 70 0 0 1 170 300" fill="none" stroke="#1d63b7" stroke-width="16"/><path d="M170 335 A70 70 0 0 1 62 335" fill="none" stroke="#74a7df" stroke-width="16"/><circle cx="58" cy="326" r="44" class="navy"/><text x="58" y="335" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">財務省</text><circle cx="174" cy="326" r="44" fill="#5f96d4"/><text x="174" y="335" text-anchor="middle" font-size="22" font-weight="800" fill="#fff">日銀</text></g><rect y="430" width="320" height="90" class="navy"/><text x="160" y="488" text-anchor="middle" class="label">為替介入</text><text x="160" y="565" text-anchor="middle" class="body">政府・日銀が円買い</text></g>

  <g transform="translate(790,190)"><rect width="320" height="610" rx="20" class="card"/><circle cx="50" cy="50" r="32" class="blue"/><text x="50" y="62" text-anchor="middle" font-size="34" font-weight="800" fill="#fff">3</text><circle cx="112" cy="132" r="54" class="blue"/><text x="112" y="154" text-anchor="middle" font-size="70" font-weight="800" fill="#fff">¥</text><g transform="translate(45,220)"><line x1="0" y1="0" x2="250" y2="0" class="grid"/><line x1="0" y1="55" x2="250" y2="55" class="grid"/><line x1="0" y1="110" x2="250" y2="110" class="grid"/><line x1="0" y1="165" x2="250" y2="165" class="grid"/><text x="-8" y="8" text-anchor="end" class="small">170</text><text x="-8" y="63" text-anchor="end" class="small">160</text><text x="-8" y="118" text-anchor="end" class="small">150</text><text x="-8" y="173" text-anchor="end" class="small">140</text><path d="M0 90 L35 70 L70 42 L105 35 L140 78 L170 96 L205 118 L235 107 L250 100" class="line"/><circle cx="250" cy="100" r="9" class="blue"/><rect x="166" y="72" width="86" height="40" rx="8" class="navy"/><text x="209" y="100" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">156円台</text><text x="0" y="205" class="small">1月</text><text x="85" y="205" class="small">4月</text><text x="165" y="205" class="small">7月</text><text x="225" y="205" class="small">10月</text></g><rect y="430" width="320" height="90" class="navy"/><text x="160" y="488" text-anchor="middle" class="label">円高方向へ</text><text x="160" y="565" text-anchor="middle" class="body">1ドル=156円台</text></g>

  <g transform="translate(1160,190)"><rect width="320" height="610" rx="20" class="card"/><circle cx="50" cy="50" r="32" class="blue"/><text x="50" y="62" text-anchor="middle" font-size="34" font-weight="800" fill="#fff">4</text><g transform="translate(70,185)"><rect x="10" y="105" width="110" height="80" rx="8" class="blue"/><rect x="28" y="85" width="74" height="26" fill="#d8e9ff" stroke="#1d63b7" stroke-width="4"/><rect x="30" y="125" width="18" height="42" fill="#74a7df"/><rect x="58" y="125" width="18" height="42" fill="#74a7df"/><rect x="86" y="125" width="18" height="42" fill="#74a7df"/><polygon points="148,55 188,25 188,55 228,25 228,55 270,25 270,185 148,185" fill="#d6d8dc"/><rect x="170" y="95" width="18" height="20" fill="#5f96d4"/><rect x="205" y="95" width="18" height="20" fill="#5f96d4"/><rect x="240" y="95" width="18" height="20" fill="#5f96d4"/><rect x="225" y="15" width="20" height="92" fill="#888"/><circle cx="250" cy="10" r="18" fill="#cfd2d8"/><circle cx="272" cy="12" r="19" fill="#cfd2d8"/></g><rect y="430" width="320" height="90" class="navy"/><text x="160" y="485" text-anchor="middle" font-size="30" font-weight="800" fill="#fff">家計・企業への影響</text><text x="160" y="565" text-anchor="middle" class="body">輸入価格・コストに影響</text></g>
</svg>