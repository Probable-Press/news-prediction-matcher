<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1500" viewBox="0 0 900 1500" role="img" aria-label="円安介入と家計・企業への影響を示すスマホ用縦型図解">
  <rect width="900" height="1500" fill="#f7f9fc"/>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif}.title{font-size:44px;font-weight:800;fill:#0b2e5f}.sub{font-size:25px;font-weight:700;fill:#23466f}.card{fill:#fff;stroke:#c8d8ed;stroke-width:3}.blue{fill:#1d63b7}.navy{fill:#0b2e5f}.label{font-size:35px;font-weight:800;fill:#fff}.body{font-size:28px;font-weight:700;fill:#222}.small{font-size:22px;fill:#333}.muted{font-size:21px;fill:#667085}.line{fill:none;stroke:#1d63b7;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}.grid{stroke:#dce5f2;stroke-width:2}.arrow{fill:#1d63b7}
  </style>
  <text x="450" y="70" text-anchor="middle" class="title">円安介入とは？</text>
  <text x="450" y="118" text-anchor="middle" class="title">家計・企業への影響</text>
  <text x="450" y="162" text-anchor="middle" class="sub">円安 → 介入 → 円高方向 → 生活コスト</text>

  <g transform="translate(90,215)">
    <rect width="720" height="230" rx="24" class="card"/>
    <circle cx="55" cy="55" r="34" class="blue"/><text x="55" y="67" text-anchor="middle" font-size="34" font-weight="800" fill="#fff">1</text>
    <circle cx="165" cy="95" r="56" class="blue"/><text x="165" y="117" text-anchor="middle" font-size="74" font-weight="800" fill="#fff">¥</text>
    <g transform="translate(300,50)"><line x1="0" y1="0" x2="330" y2="0" class="grid"/><line x1="0" y1="45" x2="330" y2="45" class="grid"/><line x1="0" y1="90" x2="330" y2="90" class="grid"/><path d="M0 105 L45 94 L85 78 L130 55 L175 35 L220 52 L265 42 L330 22" class="line"/><rect x="238" y="4" width="96" height="42" rx="9" class="navy"/><text x="286" y="33" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">160円台</text></g>
    <rect x="0" y="160" width="720" height="70" class="navy"/><text x="360" y="207" text-anchor="middle" class="label">円安</text>
  </g>
  <polygon points="420,475 480,475 450,535" class="arrow"/>

  <g transform="translate(90,560)">
    <rect width="720" height="230" rx="24" class="card"/>
    <circle cx="55" cy="55" r="34" class="blue"/><text x="55" y="67" text-anchor="middle" font-size="34" font-weight="800" fill="#fff">2</text>
    <g transform="translate(155,42)"><rect x="70" y="55" width="145" height="105" fill="#d8c7b0" stroke="#9b8b75" stroke-width="2"/><polygon points="55,55 142,5 230,55" fill="#c7b090" stroke="#9b8b75" stroke-width="2"/><rect x="95" y="84" width="20" height="76" fill="#f1e7d7"/><rect x="132" y="84" width="20" height="76" fill="#f1e7d7"/><rect x="169" y="84" width="20" height="76" fill="#f1e7d7"/><circle cx="375" cy="82" r="48" class="navy"/><text x="375" y="92" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">財務省</text><circle cx="500" cy="82" r="48" fill="#5f96d4"/><text x="500" y="92" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">日銀</text><path d="M415 142 A65 65 0 0 1 465 142" fill="none" stroke="#1d63b7" stroke-width="14"/></g>
    <rect x="0" y="160" width="720" height="70" class="navy"/><text x="360" y="207" text-anchor="middle" class="label">為替介入</text>
  </g>
  <polygon points="420,820 480,820 450,880" class="arrow"/>

  <g transform="translate(90,905)">
    <rect width="720" height="230" rx="24" class="card"/>
    <circle cx="55" cy="55" r="34" class="blue"/><text x="55" y="67" text-anchor="middle" font-size="34" font-weight="800" fill="#fff">3</text>
    <circle cx="165" cy="95" r="56" class="blue"/><text x="165" y="117" text-anchor="middle" font-size="74" font-weight="800" fill="#fff">¥</text>
    <g transform="translate(300,50)"><line x1="0" y1="0" x2="330" y2="0" class="grid"/><line x1="0" y1="45" x2="330" y2="45" class="grid"/><line x1="0" y1="90" x2="330" y2="90" class="grid"/><path d="M0 40 L45 25 L90 18 L135 50 L180 72 L230 100 L280 88 L330 82" class="line"/><rect x="238" y="62" width="96" height="42" rx="9" class="navy"/><text x="286" y="91" text-anchor="middle" font-size="24" font-weight="800" fill="#fff">156円台</text></g>
    <rect x="0" y="160" width="720" height="70" class="navy"/><text x="360" y="207" text-anchor="middle" class="label">円高方向へ</text>
  </g>
  <polygon points="420,1165 480,1165 450,1225" class="arrow"/>

  <g transform="translate(90,1250)">
    <rect width="720" height="210" rx="24" class="card"/>
    <circle cx="55" cy="55" r="34" class="blue"/><text x="55" y="67" text-anchor="middle" font-size="34" font-weight="800" fill="#fff">4</text>
    <g transform="translate(140,36)"><rect x="0" y="62" width="115" height="82" rx="8" class="blue"/><rect x="18" y="42" width="78" height="26" fill="#d8e9ff" stroke="#1d63b7" stroke-width="4"/><rect x="28" y="82" width="18" height="40" fill="#74a7df"/><rect x="58" y="82" width="18" height="40" fill="#74a7df"/><polygon points="260,45 305,15 305,45 350,15 350,45 395,15 395,145 260,145" fill="#d6d8dc"/><rect x="282" y="82" width="18" height="20" fill="#5f96d4"/><rect x="320" y="82" width="18" height="20" fill="#5f96d4"/><rect x="362" y="82" width="18" height="20" fill="#5f96d4"/></g>
    <rect x="0" y="140" width="720" height="70" class="navy"/><text x="360" y="184" text-anchor="middle" font-size="33" font-weight="800" fill="#fff">家計・企業への影響</text>
  </g>
</svg>