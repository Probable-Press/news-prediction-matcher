<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="再審制度の流れと検察抗告の焦点を示す横型図解">
  <rect width="1600" height="900" fill="#f7f8fb"/>
  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif}.title{font-size:54px;font-weight:900;fill:#172033}.sub{font-size:28px;font-weight:700;fill:#566070}.card{fill:#fff;stroke:#cfd7e3;stroke-width:3}.head{font-size:31px;font-weight:900;fill:#172033}.body{font-size:23px;font-weight:700;fill:#3f4752}.small{font-size:20px;font-weight:700;fill:#5b6573}.blue{fill:#2b6fb3}.teal{fill:#16746d}.gold{fill:#d79a2b}.red{fill:#c94b48}.line{fill:none;stroke:#16746d;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}.arrow{fill:#16746d}.pill{fill:#172033}
  </style>
  <text x="800" y="80" text-anchor="middle" class="title">再審制度見直しの焦点</text>
  <text x="800" y="130" text-anchor="middle" class="sub">裁判のやり直しへ進む道を、どこで止めるのか</text>

  <g transform="translate(70,210)">
    <rect width="270" height="430" rx="18" class="card"/>
    <circle cx="135" cy="82" r="50" class="blue"/>
    <path d="M105 105 H165 M112 80 H158 M120 58 H150" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
    <text x="135" y="172" text-anchor="middle" class="head">判決確定</text>
    <text x="135" y="224" text-anchor="middle" class="body">いったん裁判が</text>
    <text x="135" y="260" text-anchor="middle" class="body">終わる</text>
    <rect x="44" y="330" width="182" height="54" rx="27" class="pill"/>
    <text x="135" y="366" text-anchor="middle" font-size="23" font-weight="800" fill="#fff">入口</text>
  </g>

  <g transform="translate(410,210)">
    <rect width="270" height="430" rx="18" class="card"/>
    <circle cx="135" cy="82" r="50" class="gold"/>
    <path d="M96 88 L122 114 L176 60" fill="none" stroke="#fff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="135" y="172" text-anchor="middle" class="head">新証拠</text>
    <text x="135" y="224" text-anchor="middle" class="body">あとから重要な</text>
    <text x="135" y="260" text-anchor="middle" class="body">材料が出る</text>
    <rect x="44" y="330" width="182" height="54" rx="27" class="pill"/>
    <text x="135" y="366" text-anchor="middle" font-size="23" font-weight="800" fill="#fff">見直し</text>
  </g>

  <g transform="translate(750,210)">
    <rect width="270" height="430" rx="18" class="card"/>
    <circle cx="135" cy="82" r="50" class="teal"/>
    <path d="M96 84 H174 M106 112 H164 M118 56 H152" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
    <text x="135" y="172" text-anchor="middle" class="head">再審開始</text>
    <text x="135" y="224" text-anchor="middle" class="body">裁判所が</text>
    <text x="135" y="260" text-anchor="middle" class="body">やり直しを認める</text>
    <rect x="44" y="330" width="182" height="54" rx="27" class="pill"/>
    <text x="135" y="366" text-anchor="middle" font-size="23" font-weight="800" fill="#fff">大きな決定</text>
  </g>

  <g transform="translate(1090,210)">
    <rect width="270" height="430" rx="18" class="card"/>
    <circle cx="135" cy="82" r="50" class="red"/>
    <path d="M110 60 L160 110 M160 60 L110 110" stroke="#fff" stroke-width="13" stroke-linecap="round"/>
    <text x="135" y="172" text-anchor="middle" class="head">検察抗告</text>
    <text x="135" y="224" text-anchor="middle" class="body">不服申し立てを</text>
    <text x="135" y="260" text-anchor="middle" class="body">どこまで認めるか</text>
    <rect x="38" y="330" width="194" height="54" rx="27" fill="#c94b48"/>
    <text x="135" y="366" text-anchor="middle" font-size="23" font-weight="800" fill="#fff">今回の焦点</text>
  </g>

  <path d="M350 425 H390" class="line"/><polygon points="390,425 366,410 366,440" class="arrow"/>
  <path d="M690 425 H730" class="line"/><polygon points="730,425 706,410 706,440" class="arrow"/>
  <path d="M1030 425 H1070" class="line"/><polygon points="1070,425 1046,410 1046,440" class="arrow"/>

  <g transform="translate(190,705)">
    <rect width="1220" height="94" rx="22" fill="#172033"/>
    <text x="610" y="38" text-anchor="middle" font-size="27" font-weight="900" fill="#fff">ポイント</text>
    <text x="610" y="72" text-anchor="middle" class="small" fill="#dfe7f0">原則禁止は「基本は抗告しない」。ただし例外条件の書き方で制度の強さが変わる</text>
  </g>
</svg>
