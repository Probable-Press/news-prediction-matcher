<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">自賠責保険料引き上げの流れ</title>
  <desc id="desc">車やバイクの保有から自賠責、保険料改定、家計や仕事への固定費としての影響までを示す図解</desc>
  <rect width="1600" height="900" fill="#fafaf9"/>
  <rect x="64" y="64" width="1472" height="772" rx="28" fill="#ffffff" stroke="#e7e5e4" stroke-width="3"/>
  <text x="112" y="148" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="54" font-weight="700" fill="#1c1917">自賠責保険料、13年ぶり引き上げへ</text>
  <text x="116" y="204" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="28" fill="#57534e">2026年11月から平均6％余り。車・バイクの「避けにくい固定費」を確認する。</text>

  <g transform="translate(122 296)">
    <rect width="315" height="260" rx="20" fill="#eef6ff" stroke="#7aa7d9" stroke-width="3"/>
    <circle cx="94" cy="116" r="32" fill="#1f6fb2"/>
    <circle cx="222" cy="116" r="32" fill="#1f6fb2"/>
    <path d="M78 112h174l-34-58h-88l-30 58z" fill="#ffffff" stroke="#1f6fb2" stroke-width="8" stroke-linejoin="round"/>
    <path d="M128 54h86l30 58H98z" fill="#cfe8ff" stroke="#1f6fb2" stroke-width="8" stroke-linejoin="round"/>
    <text x="158" y="190" text-anchor="middle" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="30" font-weight="700" fill="#1c1917">車・バイクを持つ</text>
    <text x="158" y="230" text-anchor="middle" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="22" fill="#57534e">通勤・送迎・仕事</text>
  </g>

  <path d="M470 426h120" stroke="#a8a29e" stroke-width="8" stroke-linecap="round"/>
  <path d="M590 426l-28-20v40z" fill="#a8a29e"/>

  <g transform="translate(620 296)">
    <rect width="315" height="260" rx="20" fill="#f0fdf4" stroke="#75b889" stroke-width="3"/>
    <path d="M158 52l92 36v70c0 59-40 100-92 122-52-22-92-63-92-122V88z" fill="#ffffff" stroke="#15803d" stroke-width="8" stroke-linejoin="round"/>
    <path d="M112 154l34 34 72-82" fill="none" stroke="#15803d" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="158" y="190" text-anchor="middle" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="30" font-weight="700" fill="#1c1917">自賠責</text>
    <text x="158" y="230" text-anchor="middle" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="22" fill="#57534e">加入が必要な保険</text>
  </g>

  <path d="M968 426h120" stroke="#a8a29e" stroke-width="8" stroke-linecap="round"/>
  <path d="M1088 426l-28-20v40z" fill="#a8a29e"/>

  <g transform="translate(1118 296)">
    <rect width="315" height="260" rx="20" fill="#fff7ed" stroke="#e6a15a" stroke-width="3"/>
    <rect x="76" y="54" width="164" height="116" rx="14" fill="#ffffff" stroke="#b45309" stroke-width="8"/>
    <path d="M106 92h104M106 132h74" stroke="#b45309" stroke-width="10" stroke-linecap="round"/>
    <circle cx="222" cy="164" r="42" fill="#fef3c7" stroke="#b45309" stroke-width="8"/>
    <text x="222" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#b45309">%</text>
    <text x="158" y="210" text-anchor="middle" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="30" font-weight="700" fill="#1c1917">保険料改定</text>
    <text x="158" y="248" text-anchor="middle" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="22" fill="#57534e">平均6％余り上昇</text>
  </g>

  <g transform="translate(260 640)">
    <rect width="1080" height="118" rx="22" fill="#fef2f2" stroke="#fecaca" stroke-width="3"/>
    <text x="48" y="50" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="30" font-weight="700" fill="#991b1b">見るポイント</text>
    <text x="48" y="90" font-family="Yu Gothic, Hiragino Sans, Arial, sans-serif" font-size="24" fill="#1c1917">更新時期 / 車種ごとの新保険料 / 任意保険や車検を含めた総コスト</text>
  </g>
</svg>
