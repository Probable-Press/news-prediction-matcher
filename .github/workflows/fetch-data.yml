name: Fetch news + market data

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "実行するブランチ名"
        required: false
        default: "main"

permissions:
  contents: write

concurrency:
  group: fetch-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}
          token: ${{ secrets.PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compute date
        id: date
        run: echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Fetch news (NHK + Yahoo + BBC)
        run: |
          mkdir -p data
          python src/main.py 5 > data/news-${{ steps.date.outputs.today }}.json

      - name: Fetch top Polymarket markets
        run: |
          python src/fetch_markets.py 50 > data/markets-${{ steps.date.outputs.today }}.json

      - name: Fetch Dune on-chain large bets
        env:
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
          DUNE_QUERY_ID: ${{ secrets.DUNE_QUERY_ID }}
        run: |
          python src/fetch_dune.py > data/dune-${{ steps.date.outputs.today }}.json

      - name: Fetch Metaculus community predictions
        env:
          METACULUS_API_KEY: ${{ secrets.METACULUS_API_KEY }}
        run: |
          python src/fetch_metaculus.py 30 > data/metaculus-${{ steps.date.outputs.today }}.json

      - name: Fetch Guardian news
        env:
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
        run: |
          python src/fetch_guardian.py 15 > data/guardian-${{ steps.date.outputs.today }}.json

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "data: fetch ${{ steps.date.outputs.today }}"
          git push
